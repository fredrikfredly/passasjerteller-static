<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Passasjerteller</title>
<link rel="stylesheet" href="flipclock.css" type="text/css" />
<style>
  html, body { margin: 0; padding: 0; background: #052624; overflow: hidden; width: 100%; height: 100%; font-family: "Helvetica Neue", Helvetica, sans-serif; }
  #scale-root {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    display: flex;
    align-items: center;
    gap: 24px;
    white-space: nowrap;
    padding: 0 14px;
    height: 53px;
    box-sizing: border-box;
  }
  .bar-title { color: #d4a017; font-size: 20px; font-weight: 600; line-height: 1; }
  .bar-title .en { color: #aaa; font-weight: 400; }
  .bar-item { display: flex; align-items: center; gap: 8px; line-height: 1; }
  .bar-item .lbl { color: #d4a017; font-size: 16px; }
  .bar-item .lbl .en { color: #aaa; }
  .bar-item .t_counter { display: inline-block; }
  .bar-item .flip-clock-wrapper { margin: 0 !important; }
  .bar-item .flip-clock-wrapper ul { height: 36px !important; width: 18px !important; }
  .bar-item .flip-clock-wrapper ul li { line-height: 36px !important; }
  .bar-item .flip-clock-wrapper ul li a div div.inn { font-size: 22px !important; }
  .bar-item .flip-clock-divider { height: 36px !important; }
</style>
</head>
<body>

<div id="scale-root">
  <div class="bar-title">Reisende siden 1975 <span class="en">/ Travelers since 1975</span></div>
  <div class="bar-item">
    <span class="lbl">Innland <span class="en">/ Dom.</span></span>
    <div id="ivalue" class="t_counter"></div>
  </div>
  <div class="bar-item">
    <span class="lbl">Utland <span class="en">/ Int.</span></span>
    <div id="uvalue" class="t_counter"></div>
  </div>
  <div class="bar-item">
    <span class="lbl">Totalt <span class="en">/ Total</span></span>
    <div id="totvalue" class="t_counter"></div>
  </div>
</div>

<script src="jquery-1.7.2.min.js" type="text/javascript" charset="utf-8"></script>
<script src="flipclock.js" type="text/javascript" charset="utf-8"></script>
<script src="flipclock-cash.js" type="text/javascript" charset="utf-8"></script>
<script>
function computeData(csvText) {
  var T_START = 6;
  var T_STOP = 23;

  var lines = csvText.trim().split('\n');
  var dataMap = {};
  var keys = [];
  for (var idx = 1; idx < lines.length; idx++) {
    var cols = lines[idx].split(',').map(function(c){ return c.trim(); });
    if (cols.length >= 3 && cols[0]) {
      dataMap[cols[0]] = { i: parseInt(cols[1], 10), u: parseInt(cols[2], 10) };
      keys.push(cols[0]);
    }
  }
  keys.sort();

  var now = new Date();
  var curMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  var curDay = now.getDate();
  var curHour = now.getHours();
  var daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

  var totalI = 0, totalU = 0, dailyI = 0, dailyU = 0;
  var lastRow = { i: 0, u: 0 };
  for (var k = 0; k < keys.length; k++) {
    var date = keys[k];
    if (date < curMonth) {
      var row = dataMap[date];
      totalI += row.i;
      totalU += row.u;
      lastRow = row;
    } else {
      break;
    }
  }

  dailyI = Math.round(lastRow.i / daysInMonth);
  dailyU = Math.round(lastRow.u / daysInMonth);

  if (dataMap[curMonth]) {
    var row2 = dataMap[curMonth];
    totalI += Math.round((row2.i / daysInMonth) * (curDay - 1));
    totalU += Math.round((row2.u / daysInMonth) * (curDay - 1));
    dailyI = Math.round(row2.i / daysInMonth);
    dailyU = Math.round(row2.u / daysInMonth);
  }

  var counting = T_START <= curHour && curHour < T_STOP;
  var totalHours = T_STOP - T_START;
  var hourlyI = dailyI / totalHours;
  var hourlyU = dailyU / totalHours;

  totalI = Math.round(totalI + hourlyI * (curHour - T_START - 1));
  totalU = Math.round(totalU + hourlyU * (curHour - T_START - 1));

  var rateI = hourlyI > 0 ? (T_STOP - curHour) * 3600 / hourlyI : 0;
  var rateU = hourlyU > 0 ? (T_STOP - curHour) * 3600 / hourlyU : 0;

  return {
    i: totalI,
    u: totalU,
    i_d: rateI,
    u_d: rateU,
    count: counting && rateI > 0 && rateU > 0,
    stop: T_STOP
  };
}

function startCounter(data) {
  var d = new Date();
  var h = d.getHours();

  var ratei = (data.i_d && data.i_d > 0) ? data.i_d * 1000 : 0;
  var rateu = (data.u_d && data.u_d > 0) ? data.u_d * 1000 : 0;

  var clocki = $('#ivalue').FlipClock(data.i, { clockFace: 'Cash' });
  var clocku = $('#uvalue').FlipClock(data.u, { clockFace: 'Cash' });
  var clocktotal = $('#totvalue').FlipClock((data.u + data.i), { clockFace: 'Cash' });

  if (data.count && ratei > 0) {
    setInterval(function() {
      if (data.stop >= h) { clocki.increment(); clocktotal.increment(); }
    }, ratei);
  }
  if (data.count && rateu > 0) {
    setInterval(function() {
      if (data.stop >= h) { clocku.increment(); clocktotal.increment(); }
    }, rateu);
  }
}

function fitScale() {
  var root = document.getElementById('scale-root');
  if (!root) return;
  root.style.transform = 'translate(-50%, -50%) scale(1)';
  var w = Math.max(root.offsetWidth, root.scrollWidth);
  var h = Math.max(root.offsetHeight, root.scrollHeight);
  if (!w || !h) return;
  var scale = Math.min(window.innerWidth / w, window.innerHeight / h);
  root.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
}

$(document).ready(function() {
  $.ajax({ url: 't_counter.csv', dataType: 'text', cache: false })
    .done(function(csvText) {
      var data = computeData(csvText);
      console.log(data);
      startCounter(data);
      var tries = 0;
      var iv = setInterval(function() {
        fitScale();
        if (++tries > 30) clearInterval(iv);
      }, 200);
    })
    .fail(function() {
      console.error('Kunne ikke laste t_counter.csv');
    });
  window.addEventListener('resize', fitScale);
  window.addEventListener('load', fitScale);
});
</script>

</body>
</html>
