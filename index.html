<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Passasjerteller</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #052624;
    color: #fff;
    overflow: hidden;
    width: 100%; height: 100%;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  #bar {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    white-space: nowrap;
    gap: 18px;
    padding: 0 12px;
    height: 53px;
    box-sizing: border-box;
  }
  .title { font-size: 18px; font-weight: 700; color: #d4a017; }
  .title .en { color: #aaa; font-weight: 400; margin-left: 4px; }
  .item { display: flex; align-items: baseline; gap: 6px; }
  .lbl { font-size: 14px; color: #d4a017; }
  .lbl .en { color: #aaa; }
  .num {
    font-family: "Courier New", monospace;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    background: #000;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    min-width: 7ch;
    text-align: right;
    display: inline-block;
  }
</style>
</head>
<body>

<div id="bar">
  <div class="title">Reisende siden 1975<span class="en">/ Travelers since 1975</span></div>
  <div class="item">
    <span class="lbl">Innland<span class="en">/Dom.</span></span>
    <span class="num" id="ivalue">0</span>
  </div>
  <div class="item">
    <span class="lbl">Utland<span class="en">/Int.</span></span>
    <span class="num" id="uvalue">0</span>
  </div>
  <div class="item">
    <span class="lbl">Totalt<span class="en">/Total</span></span>
    <span class="num" id="totvalue">0</span>
  </div>
</div>

<script>
function computeData(csvText) {
  var T_START = 6, T_STOP = 23;
  var lines = csvText.trim().split('\n');
  var dataMap = {}, keys = [];
  for (var idx = 1; idx < lines.length; idx++) {
    var cols = lines[idx].split(',').map(function(c){ return c.trim(); });
    if (cols.length >= 3 && cols[0]) {
      dataMap[cols[0]] = { i: parseInt(cols[1], 10), u: parseInt(cols[2], 10) };
      keys.push(cols[0]);
    }
  }
  keys.sort();
  var now = new Date();
  var curMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  var curDay = now.getDate();
  var curHour = now.getHours();
  var daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  var totalI = 0, totalU = 0, dailyI = 0, dailyU = 0;
  var lastRow = { i: 0, u: 0 };
  for (var k = 0; k < keys.length; k++) {
    var date = keys[k];
    if (date < curMonth) {
      var row = dataMap[date];
      totalI += row.i; totalU += row.u; lastRow = row;
    } else break;
  }
  dailyI = Math.round(lastRow.i / daysInMonth);
  dailyU = Math.round(lastRow.u / daysInMonth);
  if (dataMap[curMonth]) {
    var row2 = dataMap[curMonth];
    totalI += Math.round((row2.i / daysInMonth) * (curDay - 1));
    totalU += Math.round((row2.u / daysInMonth) * (curDay - 1));
    dailyI = Math.round(row2.i / daysInMonth);
    dailyU = Math.round(row2.u / daysInMonth);
  }
  var counting = T_START <= curHour && curHour < T_STOP;
  var totalHours = T_STOP - T_START;
  var hourlyI = dailyI / totalHours;
  var hourlyU = dailyU / totalHours;
  totalI = Math.round(totalI + hourlyI * (curHour - T_START - 1));
  totalU = Math.round(totalU + hourlyU * (curHour - T_START - 1));
  var rateI = hourlyI > 0 ? (T_STOP - curHour) * 3600 / hourlyI : 0;
  var rateU = hourlyU > 0 ? (T_STOP - curHour) * 3600 / hourlyU : 0;
  return {
    i: totalI, u: totalU, i_d: rateI, u_d: rateU,
    count: counting && rateI > 0 && rateU > 0, stop: T_STOP
  };
}

function fmt(n) { return n.toLocaleString('nb-NO'); }

function fitScale() {
  var bar = document.getElementById('bar');
  bar.style.transform = 'translate(-50%, -50%) scale(1)';
  var w = bar.offsetWidth, h = bar.offsetHeight;
  if (!w || !h) return;
  var scale = Math.min(window.innerWidth / w, window.innerHeight / h);
  bar.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
}

var state = { i: 0, u: 0 };
function render() {
  document.getElementById('ivalue').textContent = fmt(state.i);
  document.getElementById('uvalue').textContent = fmt(state.u);
  document.getElementById('totvalue').textContent = fmt(state.i + state.u);
}

function init(data) {
  state.i = data.i; state.u = data.u;
  render();
  fitScale();
  var d = new Date(), h = d.getHours();
  var ratei = (data.i_d && data.i_d > 0) ? data.i_d * 1000 : 0;
  var rateu = (data.u_d && data.u_d > 0) ? data.u_d * 1000 : 0;
  if (data.count && ratei > 0) {
    setInterval(function() {
      if (data.stop >= h) { state.i++; render(); fitScale(); }
    }, ratei);
  }
  if (data.count && rateu > 0) {
    setInterval(function() {
      if (data.stop >= h) { state.u++; render(); fitScale(); }
    }, rateu);
  }
}

fetch('t_counter.csv?t=' + Date.now())
  .then(function(r) { return r.text(); })
  .then(function(txt) { init(computeData(txt)); })
  .catch(function(e) { console.error('CSV load failed', e); });

window.addEventListener('resize', fitScale);
window.addEventListener('load', fitScale);
</script>

</body>
</html>
